<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="c-letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
    <radialGradient id="inner-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Rounded gradient tile (Canva-like but branded) -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <circle cx="16" cy="14" r="15" fill="url(#inner-glow)"/>

  <!-- Big letter C (white, Canva-style) -->
  <path d="M22.4 12.5 C21.4 10.7 19.7 9.6 17.6 9.6 C13.9 9.6 11.2 12.5 11.2 16.4 C11.2 20.2 13.9 22.6 17.2 22.6 C19.5 22.6 21.3 21.5 22.5 19.6"
        stroke="url(#c-letter)" stroke-width="3.2" stroke-linecap="round" fill="none"/>

  <!-- VPN shield badge in corner -->
  <g transform="translate(22.5,22.5)">
    <path d="M -4 -4.2 L 4 -4.2 L 4 0 Q 4 3.4 0 5 Q -4 3.4 -4 0 Z"
          fill="url(#shield)" stroke="#FFFFFF" stroke-width="0.4"/>
    <path d="M -1.6 0.1 L -0.3 1.5 L 2 -1.2"
          stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
